<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood → Poem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface-page:   #EDE5D8;
      --surface:        #F5EFE4;
      --surface-raised: #FAF7F2;
      --ink:            #2C1F0E;
      --ink-light:      #5C4530;
      --ink-muted:      #9C7E60;
      --ink-faint:      #C4A882;
      --border:         rgba(100,70,30,0.15);
      --border-mid:     rgba(100,70,30,0.28);
      --border-strong:  rgba(100,70,30,0.5);
      --accent:         #7A5C38;
      --accent-fg:      #FAF7F2;
      --paper-line:     #E4D5C0;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-page:   #141009;
        --surface:        #1C1510;
        --surface-raised: #261D14;
        --ink:            #EDE0CC;
        --ink-light:      #C4A882;
        --ink-muted:      #9C7E60;
        --ink-faint:      #5C4530;
        --border:         rgba(200,160,100,0.12);
        --border-mid:     rgba(200,160,100,0.25);
        --border-strong:  rgba(200,160,100,0.45);
        --accent:         #A0784E;
        --accent-fg:      #FAF7F2;
        --paper-line:     #33261A;
      }
    }

    html, body {
      min-height: 100vh;
      background: var(--surface-page);
      font-family: 'DM Serif Display', serif;
      color: var(--ink);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 3rem 1rem 4rem;
    }

    .app {
      width: 100%;
      max-width: 580px;
    }

    /* ── Header ── */
    .app-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 0.4rem;
    }

    .app-title {
      font-size: 2.2rem;
      font-style: italic;
      line-height: 1.1;
      margin-bottom: 1.75rem;
    }

    /* ── Inputs ── */
    .mood-input {
      display: block;
      width: 100%;
      font-family: 'DM Serif Display', serif;
      font-size: 1.05rem;
      font-style: italic;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      background: var(--surface-raised);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 0.55rem;
    }
    .mood-input:focus { border-color: var(--border-strong); }
    .mood-input::placeholder { color: var(--ink-faint); }

    .second-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    .form-select {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.75rem 0.75rem;
      border: 1px solid var(--border-mid);
      border-radius: 8px;
      background: var(--surface-raised);
      color: var(--ink-light);
      outline: none;
      cursor: pointer;
    }

    .generate-btn {
      flex: 2;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.75rem 1.4rem;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .generate-btn:hover { opacity: 0.85; }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Poem card ── */
    .poem-card {
      border: 1px solid var(--border-mid);
      border-radius: 12px;
      padding: 1.75rem 1.75rem 1.25rem;
      background: var(--surface-raised);
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      transition: opacity 0.3s;
      margin-bottom: 0.4rem;
    }
    .poem-card.loading { opacity: 0.4; }

    .quote-mark {
      font-size: 3.5rem;
      line-height: 0;
      color: var(--paper-line);
      position: absolute;
      top: 1.25rem;
      left: 1.4rem;
      font-style: italic;
      user-select: none;
    }

    .haiku-lines { padding-top: 1rem; }

    .haiku-line {
      font-size: 1.25rem;
      font-style: italic;
      line-height: 1.75;
      color: var(--ink);
      display: block;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity 0.4s, transform 0.4s;
    }
    .haiku-line.visible { opacity: 1; transform: none; }

    .placeholder-text {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--ink-faint);
      text-align: center;
      letter-spacing: 0.05em;
    }

    .error-text {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #a04040;
      text-align: center;
    }

    /* ── Card footer ── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag-group { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }

    .tag-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .tag-value, .form-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      border: 1px solid var(--border-mid);
      border-radius: 999px;
      padding: 2px 10px;
    }
    .tag-value { color: var(--ink-light); }
    .form-badge { color: var(--ink-muted); border-color: var(--border); }

    .btn-group { display: flex; gap: 0.4rem; }

    .icon-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      background: transparent;
      border: 1px solid var(--border-mid);
      border-radius: 999px;
      color: var(--ink-light);
      cursor: pointer;
      transition: all 0.2s;
    }
    .icon-btn:hover { border-color: var(--border-strong); color: var(--ink); }
    .icon-btn.done { color: #5a7a40; border-color: #5a7a40; }

    .syllable-hint {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      text-align: right;
      margin-bottom: 1.75rem;
    }

    /* ── History ── */
    .history-section { margin-top: 1.5rem; }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .history-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    .clear-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: transparent;
      border: none;
      color: var(--ink-faint);
      cursor: pointer;
    }
    .clear-btn:hover { color: var(--ink-muted); }

    .history-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .history-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      background: var(--surface-raised);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .history-poem { flex: 1; }

    .history-line {
      font-size: 0.95rem;
      font-style: italic;
      line-height: 1.65;
      display: block;
      color: var(--ink);
    }

    .history-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .history-mood {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--ink-muted);
    }

    .history-form {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--ink-faint);
    }

    .history-btn-group { display: flex; gap: 0.3rem; margin-top: 2px; }

    .history-copy, .history-export {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--ink-muted);
      padding: 2px 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .history-copy:hover, .history-export:hover {
      color: var(--ink-light);
      border-color: var(--border-mid);
    }
    .history-copy.done { color: #5a7a40; border-color: #5a7a40; }

    .empty-history {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink-faint);
      text-align: center;
      padding: 1rem 0;
      letter-spacing: 0.05em;
    }

    #export-canvas { display: none; }
  </style>
</head>
<body>

<div class="app">
  <div class="app-label">Mood → Poem</div>
  <div class="app-title">How does it feel?</div>

  <input
    class="mood-input"
    id="mood-input"
    type="text"
    placeholder="e.g. restless, golden, half-awake…"
    maxlength="60"
    autocomplete="off"
  />

  <div class="second-row">
    <select class="form-select" id="form-select">
      <option value="haiku">Haiku</option>
      <option value="tanka">Tanka</option>
      <option value="senryu">Senryū</option>
    </select>
    <button class="generate-btn" id="gen-btn" onclick="generate()">Generate</button>
  </div>

  <div class="poem-card" id="poem-card">
    <div class="quote-mark">"</div>
    <div id="poem-body">
      <div class="placeholder-text">Enter a mood above to begin</div>
    </div>
    <div id="card-footer" class="card-footer" style="display:none">
      <div class="tag-group">
        <span class="tag-label">mood</span>
        <span class="tag-value" id="mood-display"></span>
        <span class="form-badge" id="form-display"></span>
      </div>
      <div class="btn-group">
        <button class="icon-btn" id="copy-btn" onclick="copyPoem()">Copy</button>
        <button class="icon-btn" id="export-btn" onclick="exportPoem()">Save image</button>
      </div>
    </div>
  </div>

  <div class="syllable-hint" id="syllable-hint">5 · 7 · 5</div>

  <div class="history-section">
    <div class="history-header">
      <span class="history-title">History</span>
      <button class="clear-btn" onclick="clearHistory()">Clear</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="empty-history">No poems yet</div>
    </div>
  </div>
</div>

<canvas id="export-canvas"></canvas>

<script>
  // ─────────────────────────────────────────────
  // CONFIGURATION
  // Replace this URL with your backend endpoint.
  // Your endpoint should accept POST requests with
  // { mood, systemPrompt } and return the raw
  // Anthropic API response JSON.
  //
  // For local testing only, you can temporarily
  // put your API key here — but NEVER deploy a
  // page with a hardcoded key to the public web.
  // ─────────────────────────────────────────────
  const API_ENDPOINT = 'api/poem';

  // ─────────────────────────────────────────────
  // Poem forms
  // ─────────────────────────────────────────────
  const FORMS = {
    haiku: {
      label: 'haiku',
      hint: '5 · 7 · 5',
      system: `You are a haiku poet. Write a single haiku — exactly 3 lines, strict 5-7-5 syllable structure. Return ONLY valid JSON: {"lines":["line1","line2","line3"]}. No preamble, no backticks. Imagistic, specific, surprising. Avoid clichés.`
    },
    tanka: {
      label: 'tanka',
      hint: '5 · 7 · 5 · 7 · 7',
      system: `You are a tanka poet. Write a single tanka — exactly 5 lines, strict 5-7-5-7-7 syllable structure. Return ONLY valid JSON: {"lines":["l1","l2","l3","l4","l5"]}. No preamble, no backticks. Lyrical, emotionally resonant, with a turn after line 3.`
    },
    senryu: {
      label: 'senryū',
      hint: '5 · 7 · 5',
      system: `You are a senryū poet. Write a single senryū — exactly 3 lines, 5-7-5 syllable structure, focused on human nature, wit, or irony. Return ONLY valid JSON: {"lines":["line1","line2","line3"]}. No preamble, no backticks. Sharp, wry, human.`
    }
  };

  // ─────────────────────────────────────────────
  // State
  // ─────────────────────────────────────────────
  let currentLines = [], currentMood = '', currentForm = '';
  let history = [];

  // ─────────────────────────────────────────────
  // DOM refs
  // ─────────────────────────────────────────────
  const moodInput    = document.getElementById('mood-input');
  const genBtn       = document.getElementById('gen-btn');
  const card         = document.getElementById('poem-card');
  const poemBody     = document.getElementById('poem-body');
  const cardFooter   = document.getElementById('card-footer');
  const moodDisplay  = document.getElementById('mood-display');
  const formDisplay  = document.getElementById('form-display');
  const copyBtn      = document.getElementById('copy-btn');
  const exportBtn    = document.getElementById('export-btn');
  const syllableHint = document.getElementById('syllable-hint');
  const historyList  = document.getElementById('history-list');

  moodInput.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });

  // ─────────────────────────────────────────────
  // Generate
  // ─────────────────────────────────────────────
  async function generate() {
    const mood = moodInput.value.trim();
    if (!mood) return;

    const formKey = document.getElementById('form-select').value;
    const form    = FORMS[formKey];

    genBtn.disabled = true;
    card.classList.add('loading');
    cardFooter.style.display = 'none';
    poemBody.innerHTML = '<div class="placeholder-text">composing…</div>';
    syllableHint.textContent = form.hint;

    try {
      const res  = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mood, systemPrompt: form.system })
      });

      const data   = await res.json();
      const text   = data.content.map(b => b.text || '').join('');
      const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
      const lines  = parsed.lines;

      currentLines = lines;
      currentMood  = mood;
      currentForm  = form.label;

      card.classList.remove('loading');
      poemBody.innerHTML = `
        <div class="haiku-lines">
          ${lines.map((l, i) => `<span class="haiku-line" id="pl${i}">${esc(l)}</span>`).join('')}
        </div>`;

      lines.forEach((_, i) => {
        setTimeout(() => {
          const el = document.getElementById('pl' + i);
          if (el) el.classList.add('visible');
        }, 80 + i * 200);
      });

      moodDisplay.textContent = mood;
      formDisplay.textContent = form.label;
      cardFooter.style.display = 'flex';
      copyBtn.textContent = 'Copy';   copyBtn.classList.remove('done');
      exportBtn.textContent = 'Save image'; exportBtn.classList.remove('done');

      addToHistory(lines, mood, form.label);

    } catch (err) {
      card.classList.remove('loading');
      poemBody.innerHTML = '<div class="error-text">Something went wrong — try again.</div>';
      console.error(err);
    }

    genBtn.disabled = false;
  }

  // ─────────────────────────────────────────────
  // Copy
  // ─────────────────────────────────────────────
  function copyPoem() {
    if (!currentLines.length) return;
    navigator.clipboard.writeText(currentLines.join('\n')).then(() => {
      copyBtn.textContent = 'Copied'; copyBtn.classList.add('done');
      setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('done'); }, 2000);
    });
  }

  function copyItem(idx, btn) {
    navigator.clipboard.writeText(history[idx].lines.join('\n')).then(() => {
      btn.textContent = 'Copied'; btn.classList.add('done');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('done'); }, 2000);
    });
  }

  // ─────────────────────────────────────────────
  // Export image
  // ─────────────────────────────────────────────
  function exportPoem(lines, mood, form, btn) {
    const l   = lines || currentLines;
    const m   = mood  || currentMood;
    const f   = form  || currentForm;
    const b   = btn   || exportBtn;
    if (!l.length) return;
    drawPoemImage(l, m, f, b);
  }

  function exportItem(idx, btn) {
    const item = history[idx];
    drawPoemImage(item.lines, item.mood, item.form, btn);
  }

  function drawPoemImage(lines, mood, form, btn) {
    const W = 800, H = 500;
    const canvas = document.getElementById('export-canvas');
    canvas.width = W; canvas.height = H;
    const ctx  = canvas.getContext('2d');
    const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    const bg        = dark ? '#1C1510' : '#FAF7F2';
    const paperLine = dark ? '#33261A' : '#E4D5C0';
    const inkMain   = dark ? '#EDE0CC' : '#2C1F0E';
    const inkMuted  = dark ? '#9C7E60' : '#9C7E60';
    const inkFaint  = dark ? '#5C4530' : '#C4A882';

    // Background
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Grain
    for (let i = 0; i < 6000; i++) {
      const x = Math.random() * W, y = Math.random() * H;
      const a = Math.random() * 0.025;
      ctx.fillStyle = dark ? `rgba(255,255,255,${a})` : `rgba(0,0,0,${a})`;
      ctx.fillRect(x, y, 1, 1);
    }

    // Rules
    ctx.strokeStyle = paperLine; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(60, 70);    ctx.lineTo(W - 60, 70);    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(60, H - 70); ctx.lineTo(W - 60, H - 70); ctx.stroke();

    // Form label (top left)
    ctx.font = '500 11px "DM Mono", monospace';
    ctx.fillStyle = inkMuted;
    ctx.textAlign = 'left';
    ctx.fillText(form.toUpperCase(), 60, 53);

    // Mood label (top right)
    ctx.textAlign = 'right';
    ctx.fillText(mood.toUpperCase(), W - 60, 53);

    // Opening quote
    ctx.font = 'italic 700 72px "DM Serif Display", serif';
    ctx.fillStyle = paperLine;
    ctx.textAlign = 'left';
    ctx.fillText('\u201C', 52, 172);

    // Poem lines (centered)
    const totalH = lines.length * 58;
    const startY = (H - totalH) / 2 + 28;
    ctx.font = 'italic 400 32px "DM Serif Display", serif';
    ctx.fillStyle = inkMain;
    ctx.textAlign = 'center';
    lines.forEach((line, i) => ctx.fillText(line, W / 2, startY + i * 58));

    // Syllable hint (bottom center)
    ctx.font = '400 12px "DM Mono", monospace';
    ctx.fillStyle = inkMuted;
    ctx.textAlign = 'center';
    const hint = form === 'tanka' ? '5 · 7 · 5 · 7 · 7' : '5 · 7 · 5';
    ctx.fillText(hint, W / 2, H - 46);

    // Branding (bottom right)
    ctx.font = '400 10px "DM Mono", monospace';
    ctx.fillStyle = inkFaint;
    ctx.textAlign = 'right';
    ctx.fillText('mood → poem', W - 60, H - 46);

    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href     = url;
      a.download = `${mood.replace(/\s+/g, '-')}-${form}.png`;
      a.click();
      URL.revokeObjectURL(url);
      btn.textContent = 'Saved!'; btn.classList.add('done');
      setTimeout(() => { btn.textContent = 'Save image'; btn.classList.remove('done'); }, 2500);
    });
  }

  // ─────────────────────────────────────────────
  // History
  // ─────────────────────────────────────────────
  function addToHistory(lines, mood, form) {
    history.unshift({ lines, mood, form });
    renderHistory();
  }

  function renderHistory() {
    if (!history.length) {
      historyList.innerHTML = '<div class="empty-history">No poems yet</div>';
      return;
    }
    historyList.innerHTML = history.map((item, idx) => `
      <div class="history-item">
        <div class="history-poem">
          ${item.lines.map(l => `<span class="history-line">${esc(l)}</span>`).join('')}
        </div>
        <div class="history-meta">
          <span class="history-mood">${esc(item.mood)}</span>
          <span class="history-form">${esc(item.form)}</span>
          <div class="history-btn-group">
            <button class="history-copy" onclick="copyItem(${idx}, this)">Copy</button>
            <button class="history-export" onclick="exportItem(${idx}, this)">Image</button>
          </div>
        </div>
      </div>`).join('');
  }

  function clearHistory() {
    history = [];
    renderHistory();
  }

  // ─────────────────────────────────────────────
  // Utility
  // ─────────────────────────────────────────────
  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
